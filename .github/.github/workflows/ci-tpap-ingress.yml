name: CI — tpap-ingress-service

on:
  push:
    paths: ['services/tpap-ingress-service/**', 'tooling/**', 'parent-pom/**']
  pull_request:
    paths: ['services/tpap-ingress-service/**', 'tooling/**', 'parent-pom/**']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/tpap-ingress-service

    services:
      kafka:
        image: confluentinc/cp-kafka:7.6.0
        ports: ['9092:9092']
        env:
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
      postgres:
        image: postgres:16-alpine
        ports: ['5432:5432']
        env:
          POSTGRES_DB: tpap_ingress_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Checkstyle
        run: mvn checkstyle:check -q

      - name: PMD
        run: mvn pmd:check -q

      - name: SpotBugs
        run: mvn spotbugs:check -q

      - name: Unit tests
        run: mvn test -Dspring.profiles.active=test

      - name: Integration tests
        run: mvn verify -P integration-test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/tpap_ingress_test
          SPRING_REDIS_HOST: localhost
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: services/tpap-ingress-service/target/surefire-reports/