# =============================================================================
# PSP Switch — Unified Docker Compose
# =============================================================================
# Services:
#   tpap-ingress-service   :8080  External TPAP REST gateway
#   transaction-orchestrator:8081  Saga coordinator
#   npci-adapter           :8082  NPCI UPI XML bridge (outbound only)
#   tpap-egress-service    :8083  Webhook dispatcher to TPAP
#   npci-response-consumer :8084  NPCI XML callback receiver (inbound)
#   ledger-service         :8085  Audit ledger + settlement recorder
#   npci-service (simulator):9090  Mock NPCI UPI network
#
# Infrastructure:
#   Kafka   :9092
#   Zookeeper:2181
#   Redis   :6379
#   PostgreSQL (ingress)      :5432  tpap_ingress
#   PostgreSQL (orchestrator) :5433  orchestrator
#   PostgreSQL (egress)       :5434  egress_db
#   PostgreSQL (ledger)       :5435  ledger_db
#
# Usage:
#   docker compose -f infra/docker/docker-compose.psp-switch.yml up -d
#   docker compose -f infra/docker/docker-compose.psp-switch.yml down -v
# =============================================================================

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════════════

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: psp-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - psp-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: psp-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - psp-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: psp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - psp-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL instances ──────────────────────────────────────────────────

  postgres-ingress:
    image: postgres:15-alpine
    container_name: psp-postgres-ingress
    restart: unless-stopped
    environment:
      POSTGRES_DB: tpap_ingress
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - pgdata-ingress:/var/lib/postgresql/data
    networks:
      - psp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-orchestrator:
    image: postgres:15-alpine
    container_name: psp-postgres-orchestrator
    restart: unless-stopped
    environment:
      POSTGRES_DB: orchestrator
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5433:5432"
    volumes:
      - pgdata-orchestrator:/var/lib/postgresql/data
    networks:
      - psp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-egress:
    image: postgres:15-alpine
    container_name: psp-postgres-egress
    restart: unless-stopped
    environment:
      POSTGRES_DB: egress_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5434:5432"
    volumes:
      - pgdata-egress:/var/lib/postgresql/data
    networks:
      - psp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-ledger:
    image: postgres:15-alpine
    container_name: psp-postgres-ledger
    restart: unless-stopped
    environment:
      POSTGRES_DB: ledger_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5435:5432"
    volumes:
      - pgdata-ledger:/var/lib/postgresql/data
    networks:
      - psp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # MOCK NPCI SIMULATOR (port 9090)
  # ═══════════════════════════════════════════════════════════════════════════

  npci-service:
    build:
      context: ../../services/npci
      dockerfile: Dockerfile
    container_name: psp-npci-service
    restart: unless-stopped
    ports:
      - "9090:8080"
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres-ingress:5432/tpap_ingress
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASS: ${POSTGRES_PASSWORD:-postgres}
      # Point NPCI callbacks to npci-response-consumer
      PSP_CALLBACK_URL: http://npci-response-consumer:8084
      BANKSWITCH_HOST: http://transaction-orchestrator:8081
    depends_on:
      postgres-ingress:
        condition: service_healthy
    networks:
      - psp-net

  # ═══════════════════════════════════════════════════════════════════════════
  # PSP SWITCH SERVICES
  # ═══════════════════════════════════════════════════════════════════════════

  # ─── 1. tpap-ingress-service (port 8080) ──────────────────────────────────
  tpap-ingress-service:
    build:
      context: ../../services/psp-switch/tpap-ingress-service
      dockerfile: Dockerfile
    container_name: psp-tpap-ingress
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_HOST: postgres-ingress
      POSTGRES_PORT: 5432
      POSTGRES_DB: tpap_ingress
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      kafka:
        condition: service_healthy
      postgres-ingress:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - psp-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── 2. transaction-orchestrator (port 8081) ──────────────────────────────
  transaction-orchestrator:
    build:
      context: ../../services/psp-switch/transaction-orchestrator
      dockerfile: Dockerfile
    container_name: psp-orchestrator
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_PAYMENT_REQUESTS: psp.payment.initiate.request
      KAFKA_TOPIC_NPCI_OUTBOUND: npci.outbound.request
      KAFKA_TOPIC_NPCI_RESPONSE: npci.inbound.response
      KAFKA_TOPIC_SWITCH_COMPLETED: psp.switch.completed.events
      POSTGRES_URL: jdbc:postgresql://postgres-orchestrator:5432/orchestrator
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NPCI_TIMEOUT_SECONDS: ${NPCI_TIMEOUT_SECONDS:-30}
      PSP_ID: ${PSP_ID:-DEMOPSP}
      CRYPTO_ENABLED: "true"
      CRYPTO_SECRET_KEY: ${CRYPTO_SECRET_KEY:-PSPSwitch2024DemoKey1234567890AB}
    depends_on:
      kafka:
        condition: service_healthy
      postgres-orchestrator:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - psp-net

  # ─── 3. npci-adapter (port 8082) ──────────────────────────────────────────
  npci-adapter:
    build:
      context: ../../services/psp-switch/npci-adapter
      dockerfile: Dockerfile
    container_name: psp-npci-adapter
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_NPCI_OUTBOUND: npci.outbound.request
      KAFKA_TOPIC_NPCI_RESPONSE: npci.inbound.response
      NPCI_BASE_URL: http://npci-service:8080
      NPCI_ORG_ID: ${NPCI_ORG_ID:-DEMOPSP}
      NPCI_CONNECT_TIMEOUT_MS: ${NPCI_CONNECT_TIMEOUT_MS:-5000}
      NPCI_READ_TIMEOUT_MS: ${NPCI_READ_TIMEOUT_MS:-30000}
      NPCI_MTLS_ENABLED: "false"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - psp-net

  # ─── 4. tpap-egress-service (port 8083) ───────────────────────────────────
  tpap-egress-service:
    build:
      context: ../../services/psp-switch/tpap-egress-service
      dockerfile: Dockerfile
    container_name: psp-tpap-egress
    restart: unless-stopped
    ports:
      - "8083:8082"
    environment:
      SERVER_PORT: 8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      POSTGRES_URL: jdbc:postgresql://postgres-egress:5432/egress_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    depends_on:
      kafka:
        condition: service_healthy
      postgres-egress:
        condition: service_healthy
    networks:
      - psp-net

  # ─── 5. npci-response-consumer (port 8084) — NEW ─────────────────────────
  npci-response-consumer:
    build:
      context: ../../services/psp-switch/npci-response-consumer
      dockerfile: Dockerfile
    container_name: psp-npci-response-consumer
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SERVER_PORT: 8084
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_NPCI_RESPONSE: npci.inbound.response
      NPCI_VERIFY_SIGNATURE: "false"
      NPCI_ORG_ID: ${NPCI_ORG_ID:-DEMOPSP}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - psp-net

  # ─── 6. ledger-service (port 8085) — NEW ─────────────────────────────────
  ledger-service:
    build:
      context: ../../services/psp-switch/ledger-service
      dockerfile: Dockerfile
    container_name: psp-ledger-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_NPCI_RESPONSE: npci.inbound.response
      KAFKA_TOPIC_SWITCH_COMPLETED: psp.switch.completed.events
      POSTGRES_URL: jdbc:postgresql://postgres-ledger:5432/ledger_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      LEDGER_CRYPTO_ENABLED: "true"
      LEDGER_CRYPTO_KEY: ${CRYPTO_SECRET_KEY:-PSPSwitch2024DemoKey1234567890AB}
    depends_on:
      kafka:
        condition: service_healthy
      postgres-ledger:
        condition: service_healthy
    networks:
      - psp-net

# =============================================================================
# Networks
# =============================================================================
networks:
  psp-net:
    driver: bridge
    name: psp-switch-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  pgdata-ingress:
    name: psp-pgdata-ingress
  pgdata-orchestrator:
    name: psp-pgdata-orchestrator
  pgdata-egress:
    name: psp-pgdata-egress
  pgdata-ledger:
    name: psp-pgdata-ledger
