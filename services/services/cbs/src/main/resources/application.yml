server:
  port: 8080

spring:
  application:
    name: cbs-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cbs_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      data-locations: classpath:db/init-cbs.sql
