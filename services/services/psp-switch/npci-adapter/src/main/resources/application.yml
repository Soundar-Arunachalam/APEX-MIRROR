server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: npci-adapter
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: npci-adapter-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

npci:
  base-url: ${NPCI_BASE_URL:http://localhost:9090}
  org-id: ${NPCI_ORG_ID:DEMOPSP}
  http:
    connect-timeout-ms: ${NPCI_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${NPCI_READ_TIMEOUT_MS:30000}
    max-connections: ${NPCI_MAX_CONNECTIONS:50}
  mtls:
    enabled: ${NPCI_MTLS_ENABLED:false}
    keystore-path: ${NPCI_KEYSTORE_PATH:}
    keystore-password: ${NPCI_KEYSTORE_PASSWORD:}
    truststore-path: ${NPCI_TRUSTSTORE_PATH:}
    truststore-password: ${NPCI_TRUSTSTORE_PASSWORD:}

kafka:
  topics:
    outbound-request: ${KAFKA_TOPIC_NPCI_OUTBOUND:npci.outbound.request}
    inbound-response: ${KAFKA_TOPIC_NPCI_RESPONSE:npci.inbound.response}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
