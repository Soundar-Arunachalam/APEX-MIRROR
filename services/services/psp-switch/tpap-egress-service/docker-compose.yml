services:
  # ═══════════════════════════════════════════════
  # Zookeeper — Required by Kafka
  # ═══════════════════════════════════════════════
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: egress-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ═══════════════════════════════════════════════
  # Kafka — Event-driven message transport
  # ═══════════════════════════════════════════════
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: egress-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ═══════════════════════════════════════════════
  # PostgreSQL — Webhook config + delivery log store
  # ═══════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: egress-postgres
    environment:
      POSTGRES_DB: egress_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./demo-tools/init-db.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro

volumes:
  pgdata:
