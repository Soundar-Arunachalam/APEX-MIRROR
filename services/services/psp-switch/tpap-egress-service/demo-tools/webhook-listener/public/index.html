<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TPAP Egress — Webhook Listener</title>
  <meta name="description" content="Real-time webhook event listener for TPAP Egress Service demo" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ── Header ── -->
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </div>
        <div>
          <h1>Webhook Listener</h1>
          <p class="subtitle">TPAP Egress → Real-time Event Capture</p>
        </div>
      </div>
      <div class="status-pills">
        <div class="pill" id="sseStatus">
          <span class="dot dot-disconnected"></span>
          <span>SSE Stream</span>
        </div>
        <div class="pill" id="eventCounter">
          <span class="counter-badge" id="totalBadge">0</span>
          <span>Received</span>
        </div>
      </div>
    </div>
  </header>

  <main class="main">
    <!-- ── Stats Bar ── -->
    <section class="stats-bar" id="statsBar">
      <div class="stat-card stat-vpa" id="statVpa">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="countVpa">0</span>
          <span class="stat-label">VPA Verification</span>
        </div>
      </div>
      <div class="stat-card stat-balance" id="statBalance">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M12 10v4"/><path d="M9 12h6"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="countBalance">0</span>
          <span class="stat-label">Balance Inquiry</span>
        </div>
      </div>
      <div class="stat-card stat-payment" id="statPayment">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="countPayment">0</span>
          <span class="stat-label">Payment Push</span>
        </div>
      </div>
    </section>

    <!-- ── Controls ── -->
    <section class="controls">
      <div class="filter-group">
        <label class="filter-label">Filter by Event Type</label>
        <div class="filter-tabs" id="filterTabs">
          <button class="filter-btn active" data-filter="ALL">All</button>
          <button class="filter-btn" data-filter="VPA_VERIFICATION">VPA</button>
          <button class="filter-btn" data-filter="BALANCE_INQUIRY">Balance</button>
          <button class="filter-btn" data-filter="PAYMENT_PUSH">Payment</button>
        </div>
      </div>
      <button class="btn btn-danger" id="btnClear">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        Clear History
      </button>
    </section>

    <!-- ── Live Feed ── -->
    <section class="card feed-card">
      <h2 class="card-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        Webhook Event History
        <span class="live-indicator" id="liveIndicator">
          <span class="live-dot"></span>LIVE
        </span>
      </h2>
      <div class="event-list" id="eventList">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </div>
          <p>Waiting for webhook events...</p>
          <p class="empty-sub">Start the egress service and publish events from the Kafka Publisher</p>
        </div>
      </div>
    </section>
  </main>

  <!-- ── Toast Container ── -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
