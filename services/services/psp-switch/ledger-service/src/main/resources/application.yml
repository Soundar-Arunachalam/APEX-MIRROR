server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: ledger-service

  datasource:
    url: ${POSTGRES_URL_LEDGER:jdbc:postgresql://localhost:5432/ledger_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ledger-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    listener:
      ack-mode: MANUAL

kafka:
  topics:
    npci-inbound-response: ${KAFKA_TOPIC_NPCI_RESPONSE:npci.inbound.response}
    switch-completed: ${KAFKA_TOPIC_SWITCH_COMPLETED:psp.switch.completed.events}

ledger:
  crypto:
    enabled: ${LEDGER_CRYPTO_ENABLED:true}
    secret-key: ${LEDGER_CRYPTO_KEY:PSPSwitch2024DemoKey1234567890AB}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.pspswitch.ledger: ${LOG_LEVEL:INFO}
    org.flywaydb: INFO
