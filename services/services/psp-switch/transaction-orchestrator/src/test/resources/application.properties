# ═══════════════════════════════════════════
# Test Configuration — H2 in-memory database
# ═══════════════════════════════════════════
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ═══════════════════════════════════════════
# Redis — Connect to local Redis (requires running)
# ═══════════════════════════════════════════
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ═══════════════════════════════════════════
# Data Crypto — disabled for tests
# ═══════════════════════════════════════════
crypto.enabled=false
crypto.secret-key=PSPSwitch2024DemoKey1234567890AB


# ═══════════════════════════════════════════
# Kafka — Disable auto-start for tests
# ═══════════════════════════════════════════
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.auto-startup=false
app.kafka.topic.payment-requests=upi.txn.requests.test

# ═══════════════════════════════════════════
# Logging
# ═══════════════════════════════════════════
logging.level.com.pspswitch.orchestrator=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level --- %msg%n
