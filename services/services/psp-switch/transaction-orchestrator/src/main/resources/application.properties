server.port=${SERVER_PORT:8081}
spring.application.name=psp-txn-orchestrator

# ═══════════════════════════════════════════
# PostgreSQL — Transaction state + Ledger
# ═══════════════════════════════════════════
spring.datasource.url=${POSTGRES_URL_ORCHESTRATOR:jdbc:postgresql://localhost:5432/orchestrator}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ═══════════════════════════════════════════
# Redis — Idempotency cache
# ═══════════════════════════════════════════
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT_MS:2000}ms

# ═══════════════════════════════════════════
# Kafka — Event-driven consumption + production
# ═══════════════════════════════════════════
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=psp-orchestrator
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# ─── Topic names (overridable via env) ───
app.kafka.topic.payment-requests=${KAFKA_TOPIC_PAYMENT_REQUESTS:psp.payment.initiate.request}
app.kafka.topic.npci-outbound-request=${KAFKA_TOPIC_NPCI_OUTBOUND:npci.outbound.request}
app.kafka.topic.npci-inbound-response=${KAFKA_TOPIC_NPCI_RESPONSE:npci.inbound.response}
app.kafka.topic.switch-completed=${KAFKA_TOPIC_SWITCH_COMPLETED:psp.switch.completed.events}

# ═══════════════════════════════════════════
# NPCI Saga Configuration
# ═══════════════════════════════════════════
app.npci.timeout-seconds=${NPCI_TIMEOUT_SECONDS:30}
app.psp.id=${PSP_ID:DEMOPSP}

# ═══════════════════════════════════════════
# Data Crypto — AES-256 PII encryption at rest
# ═══════════════════════════════════════════
crypto.enabled=${CRYPTO_ENABLED:true}
crypto.secret-key=${CRYPTO_SECRET_KEY:PSPSwitch2024DemoKey1234567890AB}

# ═══════════════════════════════════════════
# Logging
# ═══════════════════════════════════════════
logging.level.com.pspswitch.orchestrator=${LOG_LEVEL:INFO}
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level --- %msg%n
